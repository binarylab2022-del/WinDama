name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build WinDama
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Display .NET information
        run: dotnet --info

      - name: Restore
        run: dotnet restore WinDama.sln

      - name: Build
        run: dotnet build WinDama.sln --configuration Release --no-restore
