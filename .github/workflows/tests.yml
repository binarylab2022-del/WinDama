name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Run NUnit tests
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Display .NET information
        run: dotnet --info

      - name: Restore
        run: dotnet restore WinDama.sln

      - name: Build
        run: dotnet build WinDama.sln --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test WinDama.Tests\WinDama.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=WinDamaTests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WinDama-test-results
          path: '**/WinDamaTests.trx'
          if-no-files-found: warn
