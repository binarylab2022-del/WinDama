name: .NET Windows CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore WinDama1.0/WinDama.sln

      - name: Build
        run: dotnet build WinDama1.0/WinDama.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WinDama.Tests/WinDama.Tests.csproj --configuration Release --no-build --verbosity normal
